<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Staff Panel | UMAMTEK</title>

<link rel="stylesheet" href="./css/style.css?v=70">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

.staff-header{
margin-bottom:30px;
}

.staff-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
}

.staff-badge{
display:inline-block;
padding:8px 14px;
border-radius:30px;
background:#f5b301;
color:#111;
font-weight:700;
margin-top:10px;
}

</style>

</head>

<body onload="loadStaffBookings()">

<nav class="navbar">

<div class="logo-area">
<img src="logo.png" class="site-logo">
<h2 class="logo-text">UMAMTEK STAFF</h2>
</div>

<div class="nav-actions">
<button class="dark-btn" onclick="toggleDarkMode()">🌙</button>
</div>

</nav>

<section class="section">

<div class="staff-header">

<h1 class="section-title">
Assigned Jobs
</h1>

<p class="section-subtitle">
Manage customer visits, tracking and work updates.
</p>

</div>

<div id="staffBookingContainer" class="staff-grid">

<div class="card">
Loading assigned jobs...
</div>

</div>

</section>

<footer class="premium-footer">

<h2>UMAMTEK</h2>

<p>Your Project Our Priority</p>

</footer>

<script src="js/script.js"></script>

<script type="module" src="js/firebase.js"></script>

</body>

</html>
