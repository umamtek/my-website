<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login | UMAMTEK</title>

<link rel="stylesheet" href="./css/style.css?v=140">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<nav class="navbar">

<div class="logo-area">
<img src="logo.png" class="site-logo">
<h2 class="logo-text">UMAMTEK ADMIN</h2>
</div>

</nav>

<section class="section">

<h1 class="section-title">Admin Login</h1>

<div class="card" style="max-width:500px;margin:auto;">

<input type="text" id="adminName" placeholder="Enter Admin Name">

<input type="text" id="adminPhone" placeholder="Enter Admin Mobile Number">

<input type="password" id="adminCode" placeholder="Enter Admin Access Code">

<button onclick="adminLogin()">
Login to Admin Dashboard
</button>

</div>

</section>

<footer class="premium-footer">

<h2>UMAMTEK</h2>
<p>Your Project Our Priority</p>

</footer>

<script>

function adminLogin(){

  const name = document.getElementById("adminName").value.trim();
  const phone = document.getElementById("adminPhone").value.replace(/\D/g, "");
  const code = document.getElementById("adminCode").value.trim();

  if(!name || !phone || !code){
    alert("Please fill all admin login details");
    return;
  }

  if(phone.length !== 10){
    alert("Please enter valid 10 digit mobile number");
    return;
  }

  if(phone !== "9065760751"){
    alert("This mobile number is not allowed for admin access");
    return;
  }

  if(code !== "UMAMTEKADMIN2026"){
    alert("Invalid admin access code");
    return;
  }

  localStorage.setItem("umamtekAdminLoggedIn", "true");
  localStorage.setItem("umamtekAdminName", name);
  localStorage.setItem("umamtekAdminPhone", phone);

  alert("Admin login successful");
  window.location.href = "admin.html";

}

</script>

</body>
</html>
