<section class="section">

<h1 class="section-title">
Book UMAMTEK Service
</h1>

<div class="card" style="max-width:600px;margin:auto;">

<form onsubmit="submitBooking(event)">

<input type="text" id="bookingName" placeholder="Your Name">

<input type="tel" id="bookingPhone" placeholder="Phone Number">

<select id="bookingService">
<option value="">Select Service</option>
<option>House Wiring</option>
<option>Commercial Wiring</option>
<option>CCTV Installation</option>
<option>Fault Repair</option>
<option>Inverter Installation</option>
<option>New Meter Connection</option>
<option>Electrical Contractor Work</option>
</select>

<input type="text" id="bookingAddress" placeholder="Full Address">

<input type="date" id="bookingDate">

<input type="time" id="bookingTime">

<textarea id="bookingDetails" placeholder="Describe your work / issue"></textarea>

<button type="submit">
Submit Booking Request
</button>

</form>

<p style="text-align:center;margin-top:20px;font-size:14px;">
Your booking request will be saved and UMAMTEK team will contact you soon.
</p>
